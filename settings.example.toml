[storage]
backend = "rqlite"

[clickhouse]
url = "http://clickhouse:8123"
database = "alphapulse"
username = "default"
password = ""
secure = false

[rqlite]
url = "http://remote-rqlite.example.com:4001"
username = ""
password = ""
queue_writes = true
queue_timeout_seconds = 10

[crawl]
# state_backend: "sqlite" (local file, single instance) or "rqlite" (shared, safe for multiple instances)
state_backend = "sqlite"
state_path = ".runtime/state.db"
poll_interval_seconds = 300
request_timeout_seconds = 30
post_recrawl_minutes = 360
comment_refresh_minutes = 60
concurrent_requests = 4
log_level = "INFO"
user_agent = "AlphaPulseBot/0.1 (+https://github.com/xmxjq/alphapulse)"

[crawl.proxy]
enabled = false
# provider = "proxy_pool"
max_attempts = 2
fail_open = false

[crawl.proxy_pool]
base_url = "http://proxy_pool:5010"
https_only = true
acquire_timeout_seconds = 3
report_bad_on_block = true

[sources.xueqiu]
enabled = true
base_url = "https://xueqiu.com"
fetch_mode = "static"
homepage_discovery_urls = ["https://xueqiu.com"]
comments_api_template = "https://xueqiu.com/statuses/comments.json?id={post_id}&count={page_size}&page={page}"
seed_catalog_path = "seed_catalog.example.toml"
seed_refresh_minutes = 60
generated_seed_ttl_minutes = 1440

[sources.xueqiu.cookies]
# xq_a_token = ""
# xqat = ""

[sources.bilibili]
enabled = true
api_base_url = "https://api.bilibili.com"
web_base_url = "https://www.bilibili.com"
sort_mode = 3
page_size = 30
max_pages = 1000
space_discovery_backend = "api"
space_discovery_interval_minutes = 60
space_discovery_max_videos = 50
# Per-request jitter in seconds. Each request sleeps a uniform random value in
# [min, max] before firing. Keep this conservative when using an authenticated
# cookie — fast, regular cadence is the fastest way to get the account banned.
request_interval_min_seconds = 2.0
request_interval_max_seconds = 5.0

[sources.bilibili.cookies]
# SESSDATA = ""

[web]
# Bind address for `alphapulse web`. Default to loopback; expose intentionally.
host = "127.0.0.1"
port = 8000
