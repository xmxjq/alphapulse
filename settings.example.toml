[storage]
backend = "rqlite"

[clickhouse]
url = "http://clickhouse:8123"
database = "alphapulse"
username = "default"
password = ""
secure = false

[rqlite]
url = "http://remote-rqlite.example.com:4001"
username = ""
password = ""
queue_writes = true
queue_timeout_seconds = 10

[crawl]
state_path = ".runtime/state.db"
poll_interval_seconds = 300
request_timeout_seconds = 30
post_recrawl_minutes = 360
comment_refresh_minutes = 60
concurrent_requests = 4
log_level = "INFO"
user_agent = "AlphaPulseBot/0.1 (+https://github.com/xmxjq/alphapulse)"

[crawl.proxy]
enabled = false
# provider = "proxy_pool"
max_attempts = 2
fail_open = false

[crawl.proxy_pool]
base_url = "http://proxy_pool:5010"
https_only = true
acquire_timeout_seconds = 3
report_bad_on_block = true

[sources.xueqiu]
enabled = true
base_url = "https://xueqiu.com"
fetch_mode = "static"
homepage_discovery_urls = ["https://xueqiu.com"]
comments_api_template = "https://xueqiu.com/statuses/comments.json?id={post_id}&count={page_size}&page={page}"
seed_catalog_path = "seed_catalog.example.toml"
seed_refresh_minutes = 60
generated_seed_ttl_minutes = 1440

[sources.xueqiu.cookies]
# xq_a_token = ""
# xqat = ""

[sources.bilibili]
enabled = true
api_base_url = "https://api.bilibili.com"
web_base_url = "https://www.bilibili.com"
sort_mode = 3
page_size = 30
max_pages = 1000

[sources.bilibili.cookies]
# SESSDATA = ""
