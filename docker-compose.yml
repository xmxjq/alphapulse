services:
  crawler:
    build:
      context: .
      dockerfile: docker/crawler/Dockerfile
    restart: unless-stopped
    working_dir: /app
    command: ["uv", "run", "alphapulse", "--config", "/app/settings.toml", "run"]
    volumes:
      - ./:/app
    environment:
      PYTHONUNBUFFERED: "1"
  proxy_pool:
    image: jhao104/proxy_pool:latest
    restart: unless-stopped
    profiles: ["proxy"]
    ports:
      - "5010:5010"
    depends_on:
      - proxy_redis
    environment:
      DB_CONN: "redis://@proxy_redis:6379/0"
  proxy_redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["proxy"]
